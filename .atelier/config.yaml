# Atelier project config
#
# This file is the canonical project-scoped config. Committed to repo.
# Read by the CLI, the agent endpoint, the prototype, and sync scripts.

project:
  id: atelier-self  # stable UUID in real projects; self-referential name here because this IS Atelier
  name: Atelier
  description: >
    Reference implementation and canonical source for Atelier — the methodology,
    protocol, and template for multi-composer human+agent software authorship.
  created_at: 2026-04-24
  template_version: "1.0"

# Repo configuration. Atelier is versioned-file-store-agnostic — provider is an
# implementation detail. In practice at v1, git providers (GitHub/GitLab/Bitbucket)
# are the supported options.
repo:
  default_branch: main
  trace_id_pattern: "US-[0-9]+\\.[0-9]+|BRD:Epic-[0-9]+|D[0-9]+|ADR-[0-9]+|NF-[0-9]+"

# Coordination datastore binding. Capability-level — specific vendor configured
# per-deploy in environment variables, not committed to repo.
# Reference implementation default: Supabase Postgres (per ADR-027).
datastore:
  # The binding points to a logical datastore URL resolved at runtime from env
  # var ATELIER_DATASTORE_URL. Capability requirements in ARCHITECTURE.md §3.
  binding: "${ATELIER_DATASTORE_URL}"
  schema_version: "1.0"

# Identity service. Default Supabase Auth (per ADR-028); override via
# any OIDC-compliant provider. Also issues the OAuth 2.1 bearer tokens
# that the MCP endpoint accepts on every request (see ARCHITECTURE.md §7.9).
identity:
  provider: supabase-auth
  oidc_issuer: "${ATELIER_OIDC_ISSUER}"
  jwt_audience: "${ATELIER_JWT_AUDIENCE}"

# Agent interop protocol. Default MCP; swappable if ecosystem consolidates elsewhere.
agent_protocol:
  name: mcp
  transport: streamable-http
  endpoint: "${ATELIER_ENDPOINT_URL}"

# Prototype deployment target. Capability-level — specific vendor per-deploy.
# Reference implementation default: Vercel (Functions + Hosting + Cron, per ADR-027).
prototype:
  deploy_binding: "${ATELIER_PROTOTYPE_DEPLOY_URL}"
  local_dev_port: 3030

# External system integrations. Each entry is optional; absence disables the
# corresponding sync script.
integrations:
  delivery_tracker:
    # Examples: jira, linear, github-issues
    kind: null
    project_key: null
  published_docs:
    # Examples: confluence, notion, github-pages
    kind: null
    space_key: null
  design_tool:
    # Examples: figma
    kind: null
    file_key: null
  messaging:
    # Examples: slack, teams, discord
    kind: null
    channel: null
  git_provider:
    # Examples: github, gitlab, bitbucket
    kind: github
    owner: null
    repo: null

# fit_check configuration. Embedding model is swappable per ADR-024 (open).
fit_check:
  embedding_model: "${ATELIER_EMBEDDING_MODEL}"
  default_threshold: 0.80
  weak_suggestion_threshold: 0.65
  eval_set_path: "atelier/eval/fit_check"
  ci_precision_gate: 0.75
  ci_recall_gate: 0.60

# Agent-session transcript capture (ADR-024). Opt-in.
# When capture=true, the endpoint writes a sidecar transcript next to
# each contribution's content_ref (e.g., research/foo.md +
# research/foo.transcript.jsonl). Sidecars are gitignored unless explicitly
# committed under a documented PII review (see METHODOLOGY).
transcripts:
  capture: false
  format: jsonl
  sidecar_suffix: ".transcript"

# Session + lock policy defaults. Overridable per-territory.
policy:
  session_heartbeat_interval_seconds: 30
  session_ttl_seconds: 90
  lock_default_ttl_seconds: 7200     # 2 hours
  lock_max_ttl_seconds: 28800        # 8 hours
  reap_interval_seconds: 60

# Observability sink binding. Capability-level.
observability:
  sink_binding: "${ATELIER_OBSERVABILITY_SINK_URL}"

# Protocol version. Bumped when endpoint tool surface changes.
protocol_version: "1.0"

# Review and audit process (per docs/methodology/METHODOLOGY.md section 11).
# Defaults below match the bundled methodology. Teams customize without forking
# the methodology -- the discipline is the default; customization is the override.
review:
  per_pr:
    # Reviewer matrix defaults to territories.yaml review_role for the affected
    # territory. Override here only when project-specific policies apply.
    territory_overrides: {}
    # Minimum reviewers per change class. Names align with section 11.2 table.
    change_class_requires:
      discovery_content:
        - role: architect
          count: 1
      new_adr:
        - role: architect
          count: 1
      adr_reversal:
        - role: architect
          count: 2
      brd_open_questions:
        - role: architect
          count: 1
      territories_yaml:
        - role: architect
          count: 1
      config_yaml:
        - role: architect
          count: 1
      walk_change:
        - role: architect
          count: 1
      reference_implementation_code:
        # post-M2; uses the affected territory's review_role
        - role: territory_review_role
          count: 1

  milestone_exit:
    # The drift sweep at each BUILD-SEQUENCE milestone status-to-Done transition.
    # Run via `atelier audit --milestone-exit` (raw at M1, polished at M7).
    enabled: true
    require_architect_signoff: true
    audit_report_path: "docs/architecture/audits/milestone-{milestone_id}-exit.md"
    # Checks correspond to scripts/README.md "Extended cross-doc consistency".
    checks:
      - cross_doc_refs        # trace_id, ARCH section, ADR id, contract name, walk fold, markdown links
      - walk_re_run           # re-walk each composer-surface scenario
      - adr_re_eval_triggers  # surface ADRs with triggers for human review
      - open_questions_hygiene
      - traceability_validation
      - schema_consistency    # post-M2: implemented schema matches ARCH 5.1
      - traceability_coverage_threshold
      - operational_completeness  # for each capability with a user-facing surface, a docs/user/ runbook exists
    traceability_coverage_threshold: 0.95
    operational_completeness_map:
      # Maps capability classes to expected user-docs runbook locations.
      # The validator checks that each enumerated artifact in the source
      # (e.g., each adapter under integrations.*.kind) has a corresponding
      # runbook file under the listed docs/user/ subdirectory.
      mcp_clients: docs/user/connectors/
      external_integrations: docs/user/integrations/
      cli_commands: docs/user/reference/cli/

  quarterly:
    # Destination check (METHODOLOGY 11.4). Architect + PM re-read NORTH-STAR.
    enabled: true
    cadence_days: 90
    audit_report_path: "docs/architecture/audits/quarterly-{year}-Q{quarter}.md"
    # Posts a reminder via the configured messaging adapter (integrations.messaging).
    reminder_via_messaging: true

  spec_to_implementation:
    # Gate at M2+. Every code PR cites the ARCH section it implements.
    enabled: true
    require_arch_section_citation: true
    citation_block_marker: "## Implements"
    # Validator parses the block and verifies cited sections exist + diff
    # plausibly relates to those paths.
    enforce_diff_overlap_heuristic: true

  validator:
    # Atelier-bundled validator scope is in scripts/README.md.
    # Project-specific check classes can be added under
    # scripts/traceability/checks/<check_name>.mjs and registered here.
    custom_checks: []
