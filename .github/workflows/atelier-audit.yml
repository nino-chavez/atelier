name: atelier-audit

# Hybrid CI gate (post-2026-05-01 / BRD-OPEN-QUESTIONS section 29 deferred):
#
#   - PR trigger runs the FAST job only: typecheck + traceability validator
#     (PR-scoped --diff). ~60-90 seconds; catches typos, broken trace IDs,
#     TS compile errors. No Supabase setup, no substrate smokes.
#
#   - Push-to-main + workflow_dispatch + nightly cron (07:00 UTC) run the
#     FULL job: substrate smokes, real-client smoke, broadcast smoke, lens
#     smoke, M5 smokes, round-trip corpus + negative-case, eval gate
#     (informational per ADR-045). ~3-4 minutes; validates main-state.
#
#   - Within the FULL job, the cc-mcp-client probe-shape smoke is
#     path-filtered: it only runs on push when files under prototype/src/
#     app/{api,oauth,.well-known}/, prototype/src/lib/atelier/, prototype/
#     {next.config.mjs,package.json}, the smoke itself, or this workflow
#     change. The nightly cron + workflow_dispatch run it unfiltered as a
#     safety net. Rationale: the smoke takes 3-5 min and guards a regression
#     class (MCP probe URL contract) that hasn't fired since M6 because the
#     prototype's OAuth/MCP routes are stable. Most main pushes (CLI, sync
#     adapters, docs) can't break the contract, so the smoke is pure tax.
#     Y1 (PR #62) added orphan-cleanup + bumped the timeout; the path filter
#     is the strategic followup that makes the smoke cheap-to-succeed.
#
# Rationale: empirical observation across PRs #1-#12 (M1 through M6 entry)
# is that the per-PR substrate gate caught ~0 substantive bugs that
# real-use validation didn't also catch. Per-PR cost of full validation
# (~3-4 min + OpenAI embedding charges + maintenance burden when smokes
# drift from spec) exceeded the catch rate. Moving substrate validation
# to post-merge keeps the validation (state-of-main is still verified)
# without the per-PR overhead. Trade-off: main can be red for ~3-4 min
# between merge and full-job completion if substrate breaks; recovery
# model is "revert or hot-fix." Acceptable while there's one consumer
# of main (the build sessions) and no production deploy.
#
# When this revisits: BRD-OPEN-QUESTIONS section 29 trigger -- adopters
# arrive (their PRs need pre-merge validation), substrate complexity
# grows past human-eyeball verification, or the revert-on-main-broken
# model proves too costly empirically. Until then, hybrid is the
# minimum-discipline-tax shape.
#
# Branch-protection note: if main has a required status check, update
# the rule to reference "Fast checks (PR)" for PRs and (optionally)
# "Substrate audit (merge)" as informational on main. The previous
# single-name "M1 + M2 substrate audit gate" check no longer exists.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Nightly safety net for path-filtered route smokes (currently the
    # CC MCP-client probe-shape smoke). On main pushes that don't touch
    # prototype routes/config we skip that smoke for speed; the nightly
    # unfiltered run catches silent breakage within 24h.
    # 07:00 UTC = midnight PT / 03:00 ET.
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: atelier-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # Fast job (PR only): typecheck + traceability validator
  # ---------------------------------------------------------------------
  # Runs on every PR. ~60-90 seconds. Catches the cheap-to-find class:
  # TS compile errors, broken trace IDs, malformed ADR frontmatter.
  # GitGuardian (separate GitHub App) handles the secret-scanning gate.
  fast:
    name: Fast checks (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Need full history so the validator can diff against base ref
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: YAML lint (workflows + .atelier configs; PR #10 follow-up)
        # Catches the YAML 1.2 syntax errors that cause silent CI breakage.
        # PR #10 hot-fixed this workflow file after a colon-in-step-name
        # broke parsing on GitHub Actions for several weeks. The class is
        # general -- any YAML in .github/workflows or .atelier that fails
        # to parse can ship without notice. Linter is Node-only (uses the
        # existing yaml package); no Python install required.
        run: npm run lint:yaml

      - name: Portability lint (ADR-029 GCP-portability constraint)
        # Catches @vercel/edge | @vercel/kv | @vercel/edge-config imports
        # outside named adapter dirs + Supabase Realtime / RPC usage
        # outside the named adapter pattern. Per ADR-029 the reference
        # impl preserves GCP-portability; proprietary surfaces must stay
        # in well-named modules so substitution is mechanical.
        run: npm run lint:portability

      - name: Traceability validator (PR-scoped; --diff against base)
        run: |
          npx tsx scripts/traceability/validate-refs.ts \
            --diff --base origin/${{ github.base_ref }}

  # ---------------------------------------------------------------------
  # Full job (merge / manual only): all substrate smokes + eval gate
  # ---------------------------------------------------------------------
  # Runs after merge to main and on workflow_dispatch. ~3-4 minutes.
  # Validates main-state. PRs do NOT trigger this; revert or hot-fix
  # if it fails post-merge.
  full:
    name: Substrate audit (merge)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect changed paths (gates the cc-mcp-client smoke)
        # Per the strategic re-evaluation following Y1 (PR #62): the
        # cc-mcp-client smoke spawns `next dev`, takes ~3-5 min when healthy,
        # and guards a regression class (MCP probe URL contract) that hasn't
        # fired in weeks because the prototype's OAuth/MCP routes are stable.
        # Most main pushes (CLI, sync adapters, docs) can't break the contract,
        # so the smoke is pure tax there. Path-filter it to the surfaces that
        # CAN break the contract; nightly cron + manual dispatch run it
        # unfiltered as the safety net.
        #
        # On schedule / workflow_dispatch events dorny/paths-filter has no diff
        # context and defaults all filter outputs to 'true', so the smoke runs.
        id: filter
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        with:
          filters: |
            mcp_routes:
              - 'prototype/src/app/api/**'
              - 'prototype/src/app/oauth/**'
              - 'prototype/src/app/.well-known/**'
              - 'prototype/src/lib/atelier/**'
              - 'prototype/next.config.mjs'
              - 'prototype/package.json'
              - 'scripts/endpoint/__smoke__/cc-mcp-client.smoke.ts'
              - '.github/workflows/atelier-audit.yml'

      - name: Setup Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start --workdir .
        # `supabase start` applies migrations from supabase/migrations/ as
        # part of its bring-up sequence; no separate `db reset` needed.

      - name: Confirm DB reachable
        # The connection string for the ephemeral CI-only local Supabase is a
        # well-known fixture (see supabase/config.toml + 17+ DATABASE_URL
        # fallbacks across scripts/__smoke__/*). Passed via URL form to keep
        # secret-scanners happy with the shell-export-free pattern.
        run: |
          psql 'postgresql://postgres:postgres@127.0.0.1:54322/postgres' -c "SELECT count(*) FROM pg_tables WHERE schemaname='public';"

      - name: Schema-invariants smoke (ADR-005, RLS, ADR-036, fencing, ADR-035)
        run: npx tsx scripts/test/__smoke__/schema-invariants.smoke.ts

      - name: Write-library smoke (ARCH 6.x mutation contracts)
        run: npx tsx scripts/sync/lib/__smoke__/write.smoke.ts

      - name: Sync-substrate smoke (event bus + 5 scripts)
        run: npx tsx scripts/sync/__smoke__/substrate.smoke.ts

      - name: GitHub-adapter smoke (mocked fetch + delivery_sync_state)
        run: npx tsx scripts/sync/__smoke__/github.smoke.ts

      - name: Endpoint dispatcher smoke (12-tool surface + plan-review)
        run: npx tsx scripts/endpoint/__smoke__/endpoint.smoke.ts

      - name: Committer smoke (ARCH 7.8 / ADR-023 per-project committer)
        run: npx tsx scripts/endpoint/__smoke__/committer.smoke.ts

      - name: Transport wire smoke (Streamable HTTP MCP + JWKS + RFC 8414)
        run: npx tsx scripts/endpoint/__smoke__/transport.smoke.ts

      - name: Real-client smoke (real Supabase Auth -> production JWKS path; M2-mid #1)
        run: |
          set -e
          # Supabase exports API_URL / ANON_KEY / SERVICE_ROLE_KEY via
          # `supabase status -o env`. Re-shape into the SUPABASE_* names the
          # smoke prefers so it can also be run with pre-exported env outside CI.
          eval "$(supabase status -o env --workdir .)"
          export SUPABASE_URL="$API_URL"
          export SUPABASE_ANON_KEY="$ANON_KEY"
          export SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          npx tsx scripts/endpoint/__smoke__/real-client.smoke.ts

      - name: Broadcast smoke (M4 BroadcastService + real Supabase Realtime; ARCH 6.8 / ADR-029)
        run: |
          set -e
          eval "$(supabase status -o env --workdir .)"
          export SUPABASE_URL="$API_URL"
          export SUPABASE_ANON_KEY="$ANON_KEY"
          export SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          npx tsx scripts/coordination/__smoke__/broadcast.smoke.ts

      - name: Lens smoke (M3 /atelier view-model per lens; ADR-001 / ADR-017)
        run: npx tsx prototype/__smoke__/lens.smoke.ts

      - name: CLI smoke (M7 / US-11.13; atelier dev dispatcher + preflight)
        # Validates the dispatcher (`atelier --help`, unknown command exit
        # code, command-specific --help) and `atelier dev --preflight-only`
        # non-orchestrating shape. Does NOT exercise live substrate startup
        # (would tie up processes); manual end-to-end + operator runs cover
        # the full orchestration path.
        run: npx tsx scripts/cli/__smoke__/cli.smoke.ts

      - name: Triage smoke (M6 / migration 9 / ADR-018)
        # Exercises the M6 triage_pending lifecycle end-to-end:
        # below-threshold route-proposal -> triage_pending insert,
        # idempotent re-route, triagePendingApprove (creates contribution),
        # triagePendingReject, already-decided guard, cross-project
        # approver rejection. Uses the heuristic classifier for the
        # routing flow + a mocked ChatService for the LlmClassifier
        # registry-seam test (deterministic; no live LLM call).
        run: npx tsx scripts/sync/triage/__smoke__/triage.smoke.ts

      - name: Install prototype dependencies (for cc-mcp-client.smoke.ts)
        # The CC-MCP-client smoke spawns `next dev` against the prototype;
        # prototype/node_modules must exist for the dev server to boot.
        # Skipped together with the smoke when no probe-affecting paths
        # changed (saves ~1-2 min of npm ci on every other main push).
        if: steps.filter.outputs.mcp_routes == 'true'
        run: cd prototype && npm ci

      - name: CC MCP-client probe-shape smoke (M6 / promoted from M7)
        # Spawns next dev as a child process and probes every URL Claude
        # Code's MCP HTTP client is empirically known to hit during
        # /mcp connection. Catches the substrate-fix regression class
        # that bit M5/M6 six times (PRs #9, #11, #13, #14, trim commit,
        # #16). See scripts/endpoint/__smoke__/cc-mcp-client.smoke.ts
        # for the full lesson catalog.
        #
        # Path-filtered per the Y1 follow-up: only runs when the prototype's
        # MCP/OAuth routes, .well-known route, mcp-deps lib, next.config,
        # package.json, the smoke itself, or this workflow change. Nightly
        # cron + workflow_dispatch run it unfiltered.
        if: steps.filter.outputs.mcp_routes == 'true'
        run: |
          set -e
          eval "$(supabase status -o env --workdir .)"
          export ATELIER_DATASTORE_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          # POSTGRES_URL is the canonical env name post-PR-#75 (the
          # rebuild renamed ATELIER_DATASTORE_URL → POSTGRES_URL in code
          # to match the Vercel-Supabase Marketplace integration's
          # auto-provisioned shape). Both names are exported so any code
          # path reading either name resolves correctly.
          export POSTGRES_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          export ATELIER_OIDC_ISSUER="$API_URL/auth/v1"
          export ATELIER_JWT_AUDIENCE=authenticated
          export NEXT_PUBLIC_SUPABASE_URL="$API_URL"
          npx tsx scripts/endpoint/__smoke__/cc-mcp-client.smoke.ts

      - name: CC MCP-client smoke skipped (no probe-affecting paths)
        if: steps.filter.outputs.mcp_routes != 'true'
        run: |
          echo "::notice::cc-mcp-client smoke skipped — no changes under prototype/src/app/{api,oauth,.well-known}/**, prototype/src/lib/atelier/**, prototype/{next.config.mjs,package.json}, scripts/endpoint/__smoke__/cc-mcp-client.smoke.ts, or .github/workflows/atelier-audit.yml. Nightly cron at 07:00 UTC runs the smoke unfiltered."

      - name: Embeddings adapter smoke (M5 / ADR-041; mocked fetch + Noop)
        # Pure unit-shaped smoke that exercises the EmbeddingService surface
        # contract: Noop, formatModelVersion validation, OpenAI-compatible
        # adapter wire shape against a stub fetch, fail-closed paths. No
        # live OpenAI call (the optional [8] block is skipped when
        # OPENAI_API_KEY is unset).
        run: npx tsx scripts/coordination/__smoke__/embeddings.smoke.ts

      - name: find_similar handler smoke (M5 / ARCH 6.4 + US-6.5; stub embedder)
        # End-to-end against pgvector + FTS index from migration 6 with a
        # stub embedder so we can engineer known cosine relationships
        # without a live API key. Exercises the production code path
        # (dispatch -> handler -> SQL -> partition).
        run: npx tsx scripts/endpoint/__smoke__/find_similar.smoke.ts

      - name: Eval harness smoke (M5 / ADR-006; seed shape + metric arithmetic)
        # Validates the seed file structure + per-seed expected refs
        # resolve to real files + precision/recall arithmetic. No DB or
        # API key required. The full eval gate (next step) is what
        # exercises the gate semantics with real measurements.
        run: npx tsx scripts/eval/find_similar/__smoke__/eval-harness.smoke.ts

      - name: Round-trip corpus (M1 exit gate; 6 doc classes)
        run: npx tsx scripts/test/roundtrip.ts

      - name: Round-trip negative-case smoke (harness rejects drift)
        run: npx tsx scripts/test/__smoke__/roundtrip.smoke.ts

      - name: Traceability validator (full repo; informational on push to main)
        continue-on-error: true
        run: npx tsx scripts/traceability/validate-refs.ts --milestone-exit

      # ---------------------------------------------------------------------
      # find_similar eval gate (ADR-043 advisory tier P>=0.60 AND R>=0.60; ADR-045 informational)
      # ---------------------------------------------------------------------
      #
      # We split execution by
      # secret availability:
      #   - With OPENAI_API_KEY in the env (forks + main pipelines that hold
      #     the secret): embed the corpus, run the eval, FAIL the build on
      #     gate breach. This is the load-bearing gate.
      #   - Without the secret (typical PR from a fork): skip with a clear
      #     log; the eval-harness smoke above still validates the runner
      #     machinery, so the gate is not silently bypassed for runner bugs.
      #
      # Cost trade-off: each run embeds the corpus (~30 ADRs + a handful of
      # PRD/BRD/research items) once + ~20 query strings per call. At
      # text-embedding-3-small's $0.02/M-token pricing this is well under
      # one cent per run. A fixture-based optimization (cache corpus
      # embeddings in the repo, re-embed only queries) is documented in
      # atelier/eval/find_similar/README.md as a future tightening if CI
      # cost ever becomes load-bearing.
      - name: Embed corpus (M5 / ARCH 6.4.2; OPENAI_API_KEY-gated)
        if: env.OPENAI_API_KEY != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ATELIER_DATASTORE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          # POSTGRES_URL is the post-PR-#75 canonical name (embed-runner
          # and find_similar runner read this; legacy name kept for
          # backwards-compat with any code still on the old slot).
          POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: |
          set -e
          # Seed the find_similar project with a fixture project_id matching
          # the eval runner's --project arg below. URL form via env keeps
          # secret-scanners from flagging the well-known local-Supabase
          # default password used throughout the repo's __smoke__ suite.
          psql "$ATELIER_DATASTORE_URL" -c "
            INSERT INTO projects (id, name, repo_url, template_version)
            VALUES ('00000000-eea1-eea1-eea1-000000000000', 'eval-find-similar', 'https://example.invalid/eval', '1.0')
            ON CONFLICT (id) DO NOTHING;"
          npx tsx scripts/coordination/embed-runner.ts \
            --project 00000000-eea1-eea1-eea1-000000000000

      - name: "Eval gate (M5 / ADR-043 advisory tier; informational per ADR-045)"
        # Per ADR-045: the advisory-tier eval gate is INFORMATIONAL at v1.
        # The eval still runs (produces last-run.json artifact + log
        # output for review), but does NOT fail the workflow. Per-PR
        # noise floor exceeds gate margin; blocking on noise is a
        # discipline tax. Adopters who want strict gating flip
        # `find_similar.ci_gate.enabled: true` in .atelier/config.yaml
        # AND remove continue-on-error here.
        if: env.OPENAI_API_KEY != ''
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ATELIER_DATASTORE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          # POSTGRES_URL is the post-PR-#75 canonical name (find_similar
          # runner reads this; legacy name kept for backwards-compat).
          POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: |
          set -e
          npx tsx scripts/eval/find_similar/runner.ts \
            --project 00000000-eea1-eea1-eea1-000000000000 \
            --json-out atelier/eval/find_similar/last-run.json

      - name: Eval gate skipped (no OPENAI_API_KEY in env)
        if: env.OPENAI_API_KEY == ''
        run: |
          echo "::warning::OPENAI_API_KEY not set; ADR-006 eval gate skipped for this run."
          echo "Eval-harness smoke above validated the runner machinery; the gate itself"
          echo "still requires the secret to embed the corpus + queries."

      - name: Upload eval metrics (when gate ran)
        if: env.OPENAI_API_KEY != '' && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: find_similar-eval-${{ github.run_id }}
          path: atelier/eval/find_similar/last-run.json
          if-no-files-found: ignore

      - name: Stop Supabase
        if: always()
        run: supabase stop --workdir . || true
