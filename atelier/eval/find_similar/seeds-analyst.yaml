# Analyst-lens seeds (per ADR-017). Authored by Claude Opus 4.7 (1M context)
# in single session; priming + methodology per parent prompt.
#
# Reasoning shape: descriptive ("what is X for"), comparative ("how does X
# relate to Y"), boundary ("is X in scope or excluded"), context-seeking
# ("what's the rationale, what came before this decision"). These are
# queries an analyst running market-context, scope-boundary, persona, or
# prior-art research would issue against the project's own corpus.
#
# Methodology rules enforced (parent: seeds.yaml header + M5-AUDIT.md):
#   - Query paraphrases but preserves 2-3 keyword bridges to canonical body.
#   - Expected list = canonical answers ONLY. Foundational/conceptual ADRs
#     that share vocabulary but don't answer the question are EXCLUDED.
#   - No duplication of seed-001 to seed-021 in seeds.yaml; overlapping
#     topics use a different angle.

seeds:
  - id: analyst-001
    description: "Market-context wedge framing and competitive surfaces"
    query: "Where is the project's defensible wedge against commoditized SDLC sync incumbents like GitHub Spec-Kit and Linear Agents, and where does it concede the market?"
    expected:
      - docs/functional/PRD.md#2-market-context

  - id: analyst-002
    description: "Why OSS-only rather than SaaS — commercial surface boundary"
    query: "What disconfirming test must pass before any managed commercial surface ships, and why was a multi-tenant service ruled out at year-one cost math?"
    expected:
      - docs/architecture/decisions/ADR-007-no-multi-tenant-saas-self-hosted-oss-only.md

  - id: analyst-003
    description: "Adjacent-category scope boundary check"
    query: "Which adjacent product categories does this explicitly refuse to become — workflow engine, task tracker UI, chat app, design tool — and why would entering them destroy the destination?"
    expected:
      - docs/architecture/decisions/ADR-010-explicit-exclusions-enforce-scope-boundaries.md
      - docs/functional/PRD.md#5-scope-boundaries-whats-out

  - id: analyst-004
    description: "Naming rationale and rejected alternatives"
    query: "Why was the studio-metaphor name chosen over Hivemind OS, Hive, Commons, and Loom — what did the OS framing fight?"
    expected:
      - docs/architecture/decisions/ADR-020-naming-atelier.md

  - id: analyst-005
    description: "Persona model — non-dev composer surfaces"
    query: "What surface and agent client do analyst, PM, and stakeholder personas use, and what access scope does each carry against the repo and datastore?"
    expected:
      - docs/functional/PRD.md#3-personas

  - id: analyst-006
    description: "Mixed-team thesis and remote-actor first-class status"
    query: "Why are browser-based analysts not second-class reviewers in the actor model, and how many actor classes exist now versus the inherited bc-subscriptions design?"
    expected:
      - docs/architecture/decisions/ADR-009-remote-principal-actor-class-web-agents-as-first-class-compo.md

  - id: analyst-007
    description: "Two-substrate framing — sync vs coordination"
    query: "Why are the SDLC sync scripts and the blackboard coordination layer treated as two independently deployable substrates with different timescales and failure modes?"
    expected:
      - docs/architecture/decisions/ADR-016-two-orthogonal-substrates-sdlc-sync-coordination.md

  - id: analyst-008
    description: "Hive-vs-project plurality from v1"
    query: "What is the relationship between a deployed datastore-plus-endpoint instance and the projects it hosts, and why was the singleton hackathon-hive shape rejected from day one?"
    expected:
      - docs/architecture/decisions/ADR-015-one-hive-many-projects.md

  - id: analyst-009
    description: "Non-code territories — analyst case as first-class"
    query: "Why does scope_kind ship with five values including doc_region and research_artifact rather than starting files-only and extending later?"
    expected:
      - docs/architecture/decisions/ADR-003-scope-kind-generalized-from-day-one.md

  - id: analyst-010
    description: "Capability vendor-neutrality vs reference stack"
    query: "How does the architecture stay capability-level so heterogeneous teams can adopt, while the reference deployment names a specific managed stack?"
    expected:
      - docs/architecture/decisions/ADR-012-capability-level-architecture-no-vendor-lock-in.md
      - docs/functional/PRD.md#6-capability-requirements-vendor-neutral

  - id: analyst-011
    description: "Figma's role boundary — feedback surface not source"
    query: "Why does the design-tool integration treat external comments as triage input rather than as the design source-of-truth, and what flows back through proposals?"
    expected:
      - docs/architecture/decisions/ADR-019-figma-is-feedback-surface-not-design-source.md

  - id: analyst-012
    description: "External-input safety contract"
    query: "Why can no proposal generated from an external comment ever auto-merge, and what role gets notified when high-confidence proposals queue?"
    expected:
      - docs/architecture/decisions/ADR-018-triage-never-auto-merges.md

  - id: analyst-013
    description: "Audit-trail value of plan-review for regulated teams"
    query: "Beyond latency arguments, what audit-trail value does the plan-approval gate carry for regulated, audit-required teams, and why was a convention-based plan capture rejected?"
    expected:
