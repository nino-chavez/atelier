# Dev-lens seeds (per ADR-017). Authored by Claude Opus 4.7 in single
# session; priming + methodology per parent prompt.
#
# Reasoning shapes targeted: procedural ("how do I do X"), mechanism
# ("how does Y work under the hood"), implementation-trace ("what code
# path handles Z"), edge-case ("what happens when..."), schema-and-API
# ("what's the contract / signature"). Vocabulary leans on column names,
# tool names, parameter names, and code-shape terms a dev would type
# while implementing or debugging against the spec.
#
# Methodology rules (from seeds.yaml header):
#   - Query paraphrases the topic but preserves a 2-3 keyword bridge to
#     the canonical answer body. No verbatim ADR titles.
#   - Expected lists ONLY canonical answers. Foundational/conceptual ADRs
#     that share vocabulary but don't directly answer the question are
#     deliberately excluded (CAT A discipline per M5-AUDIT.md).
#   - No over-paraphrasing that severs keyword bridges (CAT B).
seeds:
  - id: dev-001
    description: "Stale lock-holder writes after lease reassignment"
    query: "What stops a session whose lock was reaped from silently overwriting an artifact after another session re-acquired the lock?"
    expected:
      - docs/architecture/decisions/ADR-004-fencing-tokens-mandatory-on-all-locks-from-v1.md

  - id: dev-002
    description: "Fencing token validation surface differences"
    query: "Where does the fencing_token actually get checked for an IDE composer versus a web composer routing through the endpoint committer?"
    expected:
      - docs/architecture/decisions/ADR-004-fencing-tokens-mandatory-on-all-locks-from-v1.md

  - id: dev-003
    description: "Acquiring multiple locks against one contribution"
    query: "Can a single contribution hold more than one acquire_lock at a time, and does each call return its own fencing_token?"
    expected:
      - docs/architecture/decisions/ADR-004-fencing-tokens-mandatory-on-all-locks-from-v1.md

  - id: dev-004
    description: "Why a third-party lock manager was rejected"
    query: "Why didn't we wrap an existing lease-based lock library and add fencing on top instead of writing our own lock subsystem?"
    expected:
      - docs/architecture/decisions/ADR-026-atelier-owns-the-lock-fencing-implementation-switchman-not-a.md
      - docs/architecture/decisions/ADR-004-fencing-tokens-mandatory-on-all-locks-from-v1.md

