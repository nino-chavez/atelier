# find_similar eval seed set (ADR-006 + BRD Epic-6)
#
# Curated against Atelier's own ADR corpus per BUILD-SEQUENCE.md M5
# ("Eval harness: labeled seed set drawn from this repo's own decisions
#  corpus -- ADRs are the natural ground truth"). Each seed entry models a
# realistic find_similar call an analyst, dev, or PM might issue while
# coordinating against this repo. The expected list enumerates every ADR
# that should appear in primary_matches for the query to count as a TP.
#
# Methodology:
#   - Query text is a paraphrase, NOT the ADR title verbatim. Embedding the
#     title back to find the same ADR is trivial and tests nothing about
#     semantic search quality.
#   - Expected ADRs in each seed are the canonical answers for the topic.
#     Tangentially-related ADRs are deliberately excluded so a system that
#     returns "similar but not the same topic" is correctly penalized.
#   - Minimum 3 expected matches per seed where the topology supports it,
#     so per-seed recall granularity is non-binary (0/0.33/0.66/1.0 vs.
#     just 0/1).
#   - 20+ seeds cover the major ADR clusters (find_similar itself,
#     contribution lifecycle, locks/fencing, reference impl, lenses,
#     remote agents, sync substrate, doc organization, etc.).
#
# CI gate per ADR-006: precision >= 0.75 AND recall >= 0.60 against this
# set. Below 0.70 precision -> file follow-up ADR adopting hybrid retrieval
# (RRF fusion of vector + BM25); see ADR-041 reverse/revisit conditions.
#
# When the corpus grows beyond ADRs (M5 will embed BRD/PRD/research
# artifacts too), seeds should expand to cover cross-source-kind queries
# (e.g. a query that should surface both an ADR + the BRD story it
# implements). M7 hardening can extend.

seeds:
  - id: find-similar-001
    description: "Eval harness coverage for the find_similar surface itself"
    query: "What is the precision and recall gate for the semantic search service, and which embedding model does the reference implementation default to?"
    expected:
      - docs/architecture/decisions/ADR-006-fit-check-ships-at-v1-with-eval-harness-and-ci-gate.md
      - docs/architecture/decisions/ADR-041-embedding-model-default-openai-compatible-adapter.md

  - id: find-similar-002
    description: "Vector search wedge framing"
